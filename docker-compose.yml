services:
  db:
    image: postgres:18
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: addio_celibato
    ports:
      - "5432:5432"
    networks: [ addio_celibato_network ]
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d addio_celibato" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    networks: [ addio_celibato_network ]
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    image: addio_celibato-backend:cazzo2
    container_name: backend_container
    profiles: [ "apps" ]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks: [ addio_celibato_network ]
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_container:5432/addio_celibato?currentSchema=app_schema,public
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:55255,http://localhost:8081,http://frontend_container:80,http://10.14.141.11:8081,http://10.14.141.11:80
      - SERVER_URL=${SERVER_URL_BE}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/alex-damico/addio_celibato-frontend:latest
    container_name: frontend_container
    profiles: [ "apps" ]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    networks: [ addio_celibato_network ]

volumes:
  postgres_data:
  pgadmin_data:

networks:
  addio_celibato_network:
    driver: bridge
