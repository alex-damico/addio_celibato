services:
  db:
    image: postgres:18
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1CGaPw9Zr6P6
      POSTGRES_DB: addio_celibato
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d addio_celibato"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build: ./be/
    container_name: backend_container
    profiles: ["apps"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_container:5432/addio_celibato?currentSchema=app_schema,public
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:55255, http://localhost:8081
      - SERVER_URL=http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  frontend:
    build: ./fe/
    container_name: frontend_container
    profiles: ["apps"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  postgres_data:
  pgadmin_data: