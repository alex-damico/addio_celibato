spring.application.name=addio_celibrato

spring.datasource.url=jdbc:postgresql://localhost:5432/addio_celibato?currentSchema=app_schema,public
spring.datasource.username=addio_celibato_app
spring.datasource.password=password
spring.jpa.properties.hibernate.default_schema=app_schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog.yaml
spring.liquibase.liquibase-schema=public
spring.liquibase.password=password
spring.liquibase.default-schema=app_schema

app.cors.allowed-origins=http://localhost:55255, https://www.tuosito.it

